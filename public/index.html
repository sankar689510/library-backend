<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library Admin</title>

    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: Segoe UI, Roboto;
            background: var(--bg);
            color: var(--text);
        }

        /* LOGIN */

        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loginBox {
            background: var(--panel);
            padding: 40px;
            border-radius: 12px;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--card);
            border: 1px solid #1f2937;
            color: white;
            border-radius: 6px;
        }

        button {
            cursor: pointer;
        }

        button.primary {
            background: var(--accent);
            color: white;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
        }

        button.danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
        }

        /* SIDEBAR */

        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background: var(--panel);
            padding: 25px;
            display: none;
            overflow-y: auto;
        }

        .sidebar h2 {
            margin-bottom: 25px;
        }

        .sidebar button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: none;
            border: none;
            color: var(--muted);
            text-align: left;
            border-radius: 6px;
        }

        .sidebar button:hover {
            background: var(--card);
            color: white;
        }

        /* MAIN */

        .main {
            margin-left: 230px;
            padding: 40px;
            display: none;
        }

        /* CARDS */

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        /* STATS */

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .statBox {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        /* TABLES */

        .tableWrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            min-width: 600px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
            text-align: left;
        }

        th {
            color: var(--muted);
        }

        /* ================= MOBILE ================= */

        @media (max-width: 768px) {

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                display: flex;
                flex-wrap: wrap;
                padding: 15px;
            }

            .sidebar h2 {
                width: 100%;
                margin-bottom: 15px;
                text-align: center;
            }

            .sidebar button {
                width: 48%;
                margin: 4px 1%;
                text-align: center;
                font-size: 14px;
            }

            .main {
                margin-left: 0;
                padding: 20px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginPage">
        <div class="loginBox">
            <h2>Admin Login</h2>
            <input id="username" placeholder="Username">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <!-- ADMIN -->
    <div class="sidebar">
        <h2>📚 Smart Admin</h2>
        <button onclick="show('dashboard')">Dashboard</button>
        <button onclick="show('addMember')">Add Member</button>
        <button onclick="show('addBook')">Add Book</button>
        <button onclick="show('manualIssue')">Manual Issue</button>
        <button onclick="show('members')">Members</button>
        <button onclick="show('books')">Books</button>
        <button onclick="show('transactions')">Transactions</button>
        <button class="danger" onclick="logout()">Logout</button>
    </div>

    <div class="main">

        <div id="dashboard" class="section">
            <div class="card">
                <h3>Library Overview</h3>
                <div class="stats">
                    <div class="statBox">
                        <h1 id="totalMembers">0</h1>
                        <p>Total Members</p>
                    </div>
                    <div class="statBox">
                        <h1 id="totalBooks">0</h1>
                        <p>Total Books</p>
                    </div>
                    <div class="statBox">
                        <h1 id="issuedBooks">0</h1>
                        <p>Issued Books</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="addMember" class="section" style="display:none;">
            <div class="card">
                <h3>Add Member</h3>
                <input id="m_name" placeholder="Name">
                <input id="m_phone" placeholder="Phone">
                <input id="m_start" type="date">
                <input id="m_expiry" type="date">
                <button class="primary" onclick="addMember()">Add Member</button>
            </div>
        </div>

        <div id="addBook" class="section" style="display:none;">
            <div class="card">
                <h3>Add Book</h3>
                <input id="b_title" placeholder="Title">
                <input id="b_author" placeholder="Author">
                <input id="b_barcode" placeholder="Barcode">
                <button class="primary" onclick="addBook()">Add Book</button>
            </div>
        </div>

        <div id="manualIssue" class="section" style="display:none;">
            <div class="card">
                <h3>Manual Issue</h3>
                <input id="issue_member_id" placeholder="Member ID">
                <input id="issue_book_id" placeholder="Book ID">
                <button class="primary" onclick="manualIssue()">Issue Book</button>
            </div>
        </div>

        <div id="members" class="section" style="display:none;">
            <div class="card">
                <h3>All Members</h3>
                <div class="tableWrapper">
                    <table id="membersTable"></table>
                </div>
            </div>
        </div>

        <div id="books" class="section" style="display:none;">
            <div class="card">
                <h3>All Books</h3>
                <div class="tableWrapper">
                    <table id="booksTable"></table>
                </div>
            </div>
        </div>

        <div id="transactions" class="section" style="display:none;">
            <div class="card">
                <h3>All Transactions</h3>
                <div class="tableWrapper">
                    <table id="transactionsTable"></table>
                </div>
            </div>
        </div>

    </div>

    <!-- YOUR ORIGINAL SCRIPT REMAINS EXACTLY SAME BELOW -->
    <script>
        /* --- Your full JS stays unchanged --- */
    </script>

</body>

</html>
