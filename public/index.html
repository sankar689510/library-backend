<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Library Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: var(--bg);
            color: var(--text);
        }

        #login {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 380px;
            padding: 40px;
            background: var(--panel);
            border-radius: 16px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #1f2937;
            background: var(--card);
            color: var(--text);
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 12px;
        }

        #app {
            display: none;
        }

        .sidebar {
            width: 240px;
            background: var(--panel);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
        }

        .logo {
            font-size: 20px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: none;
            border: none;
            color: var(--muted);
            text-align: left;
            cursor: pointer;
        }

        .nav-btn.active,
        .nav-btn:hover {
            background: var(--card);
            color: white;
        }

        .main {
            margin-left: 240px;
            padding: 40px;
        }

        .section {
            display: none;
        }

        .card {
            background: var(--panel);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        h2 {
            margin: 0 0 20px 0;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 14px 12px;
            background: #0f172a;
            color: var(--muted);
            border-bottom: 1px solid #1f2937;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #1f2937;
        }

        tr:hover td {
            background: #182033;
        }

        th:last-child,
        td:last-child {
            text-align: right;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
        }

        .stat-box h3 {
            margin: 0;
            font-size: 28px;
        }

        .stat-box p {
            margin: 5px 0 0 0;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div id="login">
        <div class="login-box">
            <h1>Library Admin</h1>
            <input id="key" placeholder="Admin Key">
            <button onclick="login()">Enter</button>
            <p id="error" style="color:#ef4444;font-size:13px;"></p>
        </div>
    </div>

    <div id="app">

        <div class="sidebar">
            <div class="logo">📚 Library</div>
            <button class="nav-btn active" onclick="show('dashboard',this)">Dashboard</button>
            <button class="nav-btn" onclick="show('members',this)">Members</button>
            <button class="nav-btn" onclick="show('books',this)">Books</button>
            <button class="nav-btn" onclick="show('issue',this)">Issue Book</button>
            <button class="nav-btn" onclick="show('transactions',this)">Transactions</button>
            <button class="nav-btn" onclick="logout()">Logout</button>
        </div>

        <div class="main">

            <div id="dashboard" class="section">
                <div class="stat-grid">
                    <div class="stat-box">
                        <h3 id="statMembers">0</h3>
                        <p>Total Members</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="statBooks">0</h3>
                        <p>Total Books</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="statIssued">0</h3>
                        <p>Issued Books</p>
                    </div>
                </div>
            </div>

            <div id="members" class="section">
                <div class="card">
                    <h2>Members</h2>
                    <table id="membersTable"></table>
                </div>
            </div>

            <div id="books" class="section">
                <div class="card">
                    <h2>Books</h2>
                    <table id="booksTable"></table>
                </div>
            </div>

            <div id="issue" class="section">
                <div class="card">
                    <h2>Issue Book</h2>
                    <select id="issueMemberSelect"></select>
                    <select id="issueBookSelect"></select>
                    <button onclick="issueBookHandler()">Issue</button>
                </div>
            </div>

            <div id="transactions" class="section">
                <div class="card">
                    <h2>Transactions</h2>
                    <table id="transactionsTable"></table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API = "http://192.168.1.5:5000";
        let ADMIN_KEY = "";

        function login() {
            ADMIN_KEY = document.getElementById("key").value;
            fetch(API + "/stats", { headers: { "x-admin-key": ADMIN_KEY } })
                .then(res => { if (!res.ok) throw "Invalid"; return res.json(); })
                .then(() => {
                    document.getElementById("login").style.display = "none";
                    document.getElementById("app").style.display = "block";
                    show('dashboard'); loadAll();
                })
                .catch(() => { document.getElementById("error").innerText = "Invalid Admin Key"; });
        }

        function logout() { location.reload(); }

        function show(id, btn) {
            document.querySelectorAll(".section").forEach(s => s.style.display = "none");
            document.getElementById(id).style.display = "block";
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            if (btn) btn.classList.add("active");
        }

        async function loadAll() {
            loadStats(); loadMembers(); loadBooks(); loadTransactions();
        }

        async function loadStats() {
            const stats = await fetch(API + "/stats", { headers: { "x-admin-key": ADMIN_KEY } }).then(r => r.json());
            statMembers.innerText = stats.total_members;
            statBooks.innerText = stats.total_books;
            statIssued.innerText = stats.issued_books;
        }

        async function loadMembers() {
            const members = await fetch(API + "/members", { headers: { "x-admin-key": ADMIN_KEY } }).then(r => r.json());
            document.getElementById("membersTable").innerHTML =
                "<tr><th>Name</th><th>Phone</th><th>Expiry</th><th></th></tr>" +
                members.map(m => `
<tr>
<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.membership_expiry?.split("T")[0]}</td>
<td><button class="btn-danger btn-small" onclick="deleteMember(${m.id})">Delete</button></td>
</tr>`).join("");

            document.getElementById("issueMemberSelect").innerHTML =
                members.map(m => `<option value="${m.id}">${m.name}</option>`).join("");
        }

        async function loadBooks() {
            const books = await fetch(API + "/books", { headers: { "x-admin-key": ADMIN_KEY } }).then(r => r.json());
            document.getElementById("booksTable").innerHTML =
                "<tr><th>Title</th><th>Available</th><th></th></tr>" +
                books.map(b => `
<tr>
<td>${b.title}</td>
<td>${b.available_copies}</td>
<td><button class="btn-danger btn-small" onclick="deleteBook(${b.id})">Delete</button></td>
</tr>`).join("");

            document.getElementById("issueBookSelect").innerHTML =
                books.map(b => `<option value="${b.id}">${b.title}</option>`).join("");
        }

        async function deleteMember(id) {
            if (!confirm("Delete this member?")) return;
            await fetch(API + "/members/" + id, { method: "DELETE", headers: { "x-admin-key": ADMIN_KEY } });
            loadAll();
        }

        async function deleteBook(id) {
            if (!confirm("Delete this book?")) return;
            await fetch(API + "/books/" + id, { method: "DELETE", headers: { "x-admin-key": ADMIN_KEY } });
            loadAll();
        }

        async function issueBookHandler() {
            const member_id = document.getElementById("issueMemberSelect").value;
            const book_id = document.getElementById("issueBookSelect").value;
            await fetch(API + "/issue", {
                method: "POST",
                headers: { "Content-Type": "application/json", "x-admin-key": ADMIN_KEY },
                body: JSON.stringify({ member_id, book_id })
            });
            alert("Book Issued");
            loadAll();
        }

        async function returnBook(transaction_id) {
            if (!confirm("Mark this book as returned?")) return;
            const res = await fetch(API + "/return", {
                method: "POST",
                headers: { "Content-Type": "application/json", "x-admin-key": ADMIN_KEY },
                body: JSON.stringify({ transaction_id })
            });
            const data = await res.json();
            if (data.fine > 0) alert("Returned. Fine: ₹" + data.fine);
            else alert("Book returned successfully.");
            loadAll();
        }

        async function loadTransactions() {
            const transactions = await fetch(API + "/transactions", { headers: { "x-admin-key": ADMIN_KEY } }).then(r => r.json());
            document.getElementById("transactionsTable").innerHTML =
                "<tr><th>Member</th><th>Book</th><th>Status</th><th>Fine</th><th></th></tr>" +
                transactions.map(t => `
<tr>
<td>${t.member_name}</td>
<td>${t.book_title}</td>
<td>${t.status}</td>
<td>${t.fine_amount || 0}</td>
<td>${t.status === "issued"
                        ? `<button class="btn-success btn-small" onclick="returnBook(${t.id})">Return</button>`
                        : ""}</td>
</tr>`).join("");
        }
    </script>

</body>

</html>
