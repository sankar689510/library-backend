<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library Admin</title>

    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: Segoe UI, Roboto;
            background: var(--bg);
            color: var(--text);
        }

        /* LOGIN */

        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loginBox {
            background: var(--panel);
            padding: 40px;
            border-radius: 12px;
            width: 320px;
        }

        /* INPUTS */

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--card);
            border: 1px solid #1f2937;
            color: white;
            border-radius: 6px;
        }

        button {
            cursor: pointer;
        }

        button.primary {
            background: var(--accent);
            color: white;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
        }

        button.danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
        }

        /* SIDEBAR */

        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background: var(--panel);
            padding: 25px;
            display: none;
            overflow-y: auto;
        }

        .sidebar h2 {
            margin-bottom: 25px;
        }

        .sidebar button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: none;
            border: none;
            color: var(--muted);
            text-align: left;
            border-radius: 6px;
        }

        .sidebar button:hover {
            background: var(--card);
            color: white;
        }

        /* MAIN */

        .main {
            margin-left: 230px;
            padding: 40px;
            display: none;
        }

        /* CARDS */

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        /* STATS */

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .statBox {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        /* TABLES */

        .tableWrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            min-width: 600px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
            text-align: left;
        }

        th {
            color: var(--muted);
        }

        /* MOBILE */

        @media (max-width: 768px) {

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                display: flex;
                flex-wrap: wrap;
                padding: 15px;
            }

            .sidebar h2 {
                width: 100%;
                margin-bottom: 15px;
                text-align: center;
            }

            .sidebar button {
                width: 48%;
                margin: 4px 1%;
                text-align: center;
                font-size: 14px;
            }

            .main {
                margin-left: 0;
                padding: 20px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginPage">
        <div class="loginBox">
            <h2>Admin Login</h2>
            <input id="username" placeholder="Username">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <!-- ADMIN -->
    <div class="sidebar">
        <h2>📚 Smart Admin</h2>
        <button onclick="show('dashboard')">Dashboard</button>
        <button onclick="show('addMember')">Add Member</button>
        <button onclick="show('addBook')">Add Book</button>
        <button onclick="show('manualIssue')">Manual Issue</button>
        <button onclick="show('members')">Members</button>
        <button onclick="show('books')">Books</button>
        <button onclick="show('transactions')">Transactions</button>
        <button class="danger" onclick="logout()">Logout</button>
    </div>

    <div class="main">

        <div id="dashboard" class="section">
            <div class="card">
                <h3>Library Overview</h3>
                <div class="stats">
                    <div class="statBox">
                        <h1 id="totalMembers">0</h1>
                        <p>Total Members</p>
                    </div>
                    <div class="statBox">
                        <h1 id="totalBooks">0</h1>
                        <p>Total Books</p>
                    </div>
                    <div class="statBox">
                        <h1 id="issuedBooks">0</h1>
                        <p>Issued Books</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="addMember" class="section" style="display:none;">
            <div class="card">
                <h3>Add Member</h3>
                <input id="m_name" placeholder="Name">
                <input id="m_phone" placeholder="Phone">
                <input id="m_start" type="date">
                <input id="m_expiry" type="date">
                <button class="primary" onclick="addMember()">Add Member</button>
            </div>
        </div>

        <div id="addBook" class="section" style="display:none;">
            <div class="card">
                <h3>Add Book</h3>
                <input id="b_title" placeholder="Title">
                <input id="b_author" placeholder="Author">
                <input id="b_barcode" placeholder="Barcode">
                <button class="primary" onclick="addBook()">Add Book</button>
            </div>
        </div>

        <div id="manualIssue" class="section" style="display:none;">
            <div class="card">
                <h3>Manual Issue</h3>
                <input id="issue_member_id" placeholder="Member ID">
                <input id="issue_book_id" placeholder="Book ID">
                <button class="primary" onclick="manualIssue()">Issue Book</button>
            </div>
        </div>

        <div id="members" class="section" style="display:none;">
            <div class="card">
                <h3>All Members</h3>
                <div class="tableWrapper">
                    <table id="membersTable"></table>
                </div>
            </div>
        </div>

        <div id="books" class="section" style="display:none;">
            <div class="card">
                <h3>All Books</h3>
                <div class="tableWrapper">
                    <table id="booksTable"></table>
                </div>
            </div>
        </div>

        <div id="transactions" class="section" style="display:none;">
            <div class="card">
                <h3>All Transactions</h3>
                <div class="tableWrapper">
                    <table id="transactionsTable"></table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API = "https://library-backend-dm8n.onrender.com";
        let token = localStorage.getItem("adminToken");

        function showAdmin() {
            document.getElementById("loginPage").style.display = "none";
            document.querySelector(".sidebar").style.display = "block";
            document.querySelector(".main").style.display = "block";
            loadDashboard();
        }

        function logout() {
            localStorage.removeItem("adminToken");
            location.reload();
        }

        async function adminLogin() {
            const res = await fetch(API + "/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })
            });

            const data = await res.json();
            if (!res.ok) { alert(data.error); return; }

            localStorage.setItem("adminToken", data.token);
            token = data.token;
            showAdmin();
        }

        async function secureFetch(url, options = {}) {
            options.headers = options.headers || {};
            options.headers["Authorization"] = "Bearer " + token;
            const res = await fetch(url, options);
            if (res.status === 403) { alert("Session expired"); logout(); return; }
            return res;
        }

        function show(id) {
            document.querySelectorAll(".section").forEach(s => s.style.display = "none");
            document.getElementById(id).style.display = "block";
            if (id === "members") loadMembers();
            if (id === "books") loadBooks();
            if (id === "transactions") loadTransactions();
            if (id === "dashboard") loadDashboard();
        }

        async function loadDashboard() {
            const members = await secureFetch(API + "/admin/members").then(r => r.json());
            const books = await secureFetch(API + "/admin/books").then(r => r.json());
            totalMembers.innerText = members.length;
            totalBooks.innerText = books.length;
            issuedBooks.innerText = books.filter(b => b.status === "issued").length;
        }

        async function addMember() {
            const res = await secureFetch(API + "/admin/add-member", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: m_name.value,
                    phone: m_phone.value,
                    membership_start: m_start.value,
                    membership_expiry: m_expiry.value
                })
            });
            const data = await res.json();
            alert(res.ok ? "Member Added" : data.error);
        }

        async function addBook() {
            const res = await secureFetch(API + "/admin/add-book", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    title: b_title.value,
                    author: b_author.value,
                    barcode: b_barcode.value
                })
            });
            const data = await res.json();
            alert(res.ok ? "Book Added" : data.error);
        }

        async function manualIssue() {
            const res = await secureFetch(API + "/admin/issue", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    member_id: issue_member_id.value,
                    book_id: issue_book_id.value
                })
            });
            const data = await res.json();
            alert(res.ok ? data.message : data.error);
        }

        async function deleteMember(id) {
            if (!confirm("Remove member?")) return;
            await secureFetch(API + "/admin/delete-member/" + id, { method: "DELETE" });
            loadMembers();
        }

        async function deleteBook(id) {
            if (!confirm("Delete book?")) return;
            await secureFetch(API + "/admin/delete-book/" + id, { method: "DELETE" });
            loadBooks();
        }

        async function loadMembers() {
            const data = await secureFetch(API + "/admin/members").then(r => r.json());
            membersTable.innerHTML =
                "<tr><th>Name</th><th>Phone</th><th>Expiry</th><th></th></tr>" +
                data.map(m => `
<tr>
<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.membership_expiry?.split("T")[0]}</td>
<td><button class="danger" onclick="deleteMember(${m.id})">Delete</button></td>
</tr>`).join("");
        }

        async function loadBooks() {
            const data = await secureFetch(API + "/admin/books").then(r => r.json());
            booksTable.innerHTML =
                "<tr><th>Title</th><th>Author</th><th>Status</th><th></th></tr>" +
                data.map(b => `
<tr>
<td>${b.title}</td>
<td>${b.author}</td>
<td>${b.status}</td>
<td><button class="danger" onclick="deleteBook(${b.id})">Delete</button></td>
</tr>`).join("");
        }

        async function loadTransactions() {
            const data = await secureFetch(API + "/admin/transactions").then(r => r.json());
            transactionsTable.innerHTML =
                "<tr><th>Member</th><th>Book</th><th>Status</th><th>Fine</th></tr>" +
                data.map(t => `
<tr>
<td>${t.member_name}</td>
<td>${t.book_title}</td>
<td>${t.status}</td>
<td>${t.fine || 0}</td>
</tr>`).join("");
        }

        if (token) showAdmin();
    </script>

</body>

</html>
